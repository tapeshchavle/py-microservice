syntax = "proto3";

package item;

option java_multiple_files = true;
option java_package = "com.example.javaservice.grpc";
option java_outer_classname = "ItemProto";

service ItemGrpcService {
    rpc GetAllItems (EmptyRequest) returns (ItemListResponse) {}
    rpc GetItem (GetItemRequest) returns (ItemResponse) {}
}

message EmptyRequest {}

message ItemResponse {
    int32 id = 1;
    string name = 2;
    string description = 3;
}

message ItemListResponse {
    repeated ItemResponse items = 1;
}

message GetItemRequest {
    int32 id = 1;
}
